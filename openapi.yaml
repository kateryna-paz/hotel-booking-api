openapi: 3.0.3
info:
  title: Hotel Booking API
  version: 1.0.0
  description: |
    REST API for a hotel booking system. Provides full CRUD operations
    for Hotels and Rooms, along with room availability and booking management.
  contact:
    name: Kateryna Paz
    email: katepaz05@gmail.com
  license:
    name: MIT

servers:
  - url: https://api.hotelbooking.example.com/v1
    description: Production server
  - url: http://localhost:3000/v1
    description: Local development server

tags:
  - name: Hotels
    description: Operations related to hotels
  - name: Rooms
    description: Operations related to hotel rooms

paths:
  /hotels:
    get:
      tags: [Hotels]
      operationId: listHotels
      summary: List all hotels
      description: Returns a paginated list of all available hotels.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of items per page
        - name: city
          in: query
          schema:
            type: string
          description: Filter hotels by city
        - name: stars
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
          description: Filter hotels by star rating
      responses:
        "200":
          description: A list of hotels
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Hotel"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
              example:
                data:
                  - id: "h-001"
                    name: "Grand Palace Hotel"
                    city: "Kyiv"
                    address: "1 Khreshchatyk St, Kyiv, Ukraine"
                    stars: 5
                    description: "Luxury hotel in the heart of Kyiv"
                    phone: "+380441234567"
                    email: "info@grandpalace.ua"
                    createdAt: "2024-01-15T10:00:00Z"
                    updatedAt: "2024-06-01T12:00:00Z"
                pagination:
                  page: 1
                  limit: 20
                  total: 1
                  totalPages: 1
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Hotels]
      operationId: createHotel
      summary: Create a new hotel
      description: Creates a new hotel record.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelCreate"
            example:
              name: "Grand Palace Hotel"
              city: "Kyiv"
              address: "1 Khreshchatyk St, Kyiv, Ukraine"
              stars: 5
              description: "Luxury hotel in the heart of Kyiv"
              phone: "+380441234567"
              email: "info@grandpalace.ua"
      responses:
        "201":
          description: Hotel created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /hotels/{hotelId}:
    parameters:
      - name: hotelId
        in: path
        required: true
        schema:
          type: string
        description: Unique hotel identifier
        example: "h-001"

    get:
      tags: [Hotels]
      operationId: getHotelById
      summary: Get hotel by ID
      description: Returns a single hotel by its ID.
      responses:
        "200":
          description: Hotel found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags: [Hotels]
      operationId: updateHotel
      summary: Update hotel
      description: Updates all fields of an existing hotel.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelCreate"
      responses:
        "200":
          description: Hotel updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      tags: [Hotels]
      operationId: patchHotel
      summary: Partially update hotel
      description: Updates one or more fields of an existing hotel.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelPatch"
      responses:
        "200":
          description: Hotel patched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Hotels]
      operationId: deleteHotel
      summary: Delete hotel
      description: Permanently removes a hotel and all its rooms.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Hotel deleted successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /hotels/{hotelId}/rooms:
    parameters:
      - name: hotelId
        in: path
        required: true
        schema:
          type: string
        description: Unique hotel identifier

    get:
      tags: [Rooms]
      operationId: listRooms
      summary: List rooms in a hotel
      description: Returns all rooms belonging to a specific hotel.
      parameters:
        - name: available
          in: query
          schema:
            type: boolean
          description: Filter by availability
        - name: type
          in: query
          schema:
            type: string
            enum: [single, double, suite, deluxe]
          description: Filter by room type
        - name: minPrice
          in: query
          schema:
            type: number
            minimum: 0
          description: Minimum price per night (USD)
        - name: maxPrice
          in: query
          schema:
            type: number
            minimum: 0
          description: Maximum price per night (USD)
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Room"
              example:
                data:
                  - id: "r-101"
                    hotelId: "h-001"
                    number: "101"
                    type: "double"
                    floor: 1
                    pricePerNight: 150.00
                    capacity: 2
                    isAvailable: true
                    amenities: ["WiFi", "TV", "Mini-bar", "Air conditioning"]
                    createdAt: "2024-01-15T10:00:00Z"
                    updatedAt: "2024-06-01T12:00:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Rooms]
      operationId: createRoom
      summary: Add a room to hotel
      description: Creates a new room in the specified hotel.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomCreate"
            example:
              number: "101"
              type: "double"
              floor: 1
              pricePerNight: 150.00
              capacity: 2
              amenities: ["WiFi", "TV", "Mini-bar"]
      responses:
        "201":
          description: Room created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /hotels/{hotelId}/rooms/{roomId}:
    parameters:
      - name: hotelId
        in: path
        required: true
        schema:
          type: string
        description: Unique hotel identifier
      - name: roomId
        in: path
        required: true
        schema:
          type: string
        description: Unique room identifier

    get:
      tags: [Rooms]
      operationId: getRoomById
      summary: Get room by ID
      description: Returns details of a specific room.
      responses:
        "200":
          description: Room found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags: [Rooms]
      operationId: updateRoom
      summary: Update room
      description: Fully updates a room record.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomCreate"
      responses:
        "200":
          description: Room updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      tags: [Rooms]
      operationId: patchRoom
      summary: Partially update room
      description: Updates one or more fields of a room.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomPatch"
      responses:
        "200":
          description: Room patched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Rooms]
      operationId: deleteRoom
      summary: Delete room
      description: Permanently removes a room from the hotel.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Room deleted successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token obtained from your authentication provider.
        Pass it in the `Authorization` header as `Bearer <token>`.

  schemas:
    Hotel:
      type: object
      required: [id, name, city, address, stars, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: Unique hotel identifier
          example: "h-001"
        name:
          type: string
          description: Hotel name
          example: "Grand Palace Hotel"
        city:
          type: string
          description: City where the hotel is located
          example: "Kyiv"
        address:
          type: string
          description: Full street address
          example: "1 Khreshchatyk St, Kyiv, Ukraine"
        stars:
          type: integer
          minimum: 1
          maximum: 5
          description: Star rating of the hotel
          example: 5
        description:
          type: string
          description: Hotel description
          example: "Luxury hotel in the heart of Kyiv"
        phone:
          type: string
          description: Contact phone number
          example: "+380441234567"
        email:
          type: string
          format: email
          description: Contact email
          example: "info@grandpalace.ua"
        createdAt:
          type: string
          format: date-time
          description: Record creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Record last update timestamp

    HotelCreate:
      type: object
      required: [name, city, address, stars]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 150
          example: "Grand Palace Hotel"
        city:
          type: string
          example: "Kyiv"
        address:
          type: string
          example: "1 Khreshchatyk St, Kyiv, Ukraine"
        stars:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        description:
          type: string
          example: "Luxury hotel in the heart of Kyiv"
        phone:
          type: string
          example: "+380441234567"
        email:
          type: string
          format: email
          example: "info@grandpalace.ua"

    HotelPatch:
      type: object
      properties:
        name:
          type: string
        city:
          type: string
        address:
          type: string
        stars:
          type: integer
          minimum: 1
          maximum: 5
        description:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email

    Room:
      type: object
      required:
        [
          id,
          hotelId,
          number,
          type,
          floor,
          pricePerNight,
          capacity,
          isAvailable,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: string
          description: Unique room identifier
          example: "r-101"
        hotelId:
          type: string
          description: ID of the hotel this room belongs to
          example: "h-001"
        number:
          type: string
          description: Room number
          example: "101"
        type:
          type: string
          enum: [single, double, suite, deluxe]
          description: Room category
          example: "double"
        floor:
          type: integer
          minimum: 0
          description: Floor number
          example: 1
        pricePerNight:
          type: number
          format: float
          minimum: 0
          description: Price per night in USD
          example: 150.00
        capacity:
          type: integer
          minimum: 1
          description: Maximum number of guests
          example: 2
        isAvailable:
          type: boolean
          description: Whether the room is currently available for booking
          example: true
        amenities:
          type: array
          items:
            type: string
          description: List of room amenities
          example: ["WiFi", "TV", "Mini-bar", "Air conditioning"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RoomCreate:
      type: object
      required: [number, type, floor, pricePerNight, capacity]
      properties:
        number:
          type: string
          example: "101"
        type:
          type: string
          enum: [single, double, suite, deluxe]
          example: "double"
        floor:
          type: integer
          minimum: 0
          example: 1
        pricePerNight:
          type: number
          format: float
          minimum: 0
          example: 150.00
        capacity:
          type: integer
          minimum: 1
          example: 2
        isAvailable:
          type: boolean
          default: true
        amenities:
          type: array
          items:
            type: string
          example: ["WiFi", "TV"]

    RoomPatch:
      type: object
      properties:
        number:
          type: string
        type:
          type: string
          enum: [single, double, suite, deluxe]
        floor:
          type: integer
          minimum: 0
        pricePerNight:
          type: number
          minimum: 0
        capacity:
          type: integer
          minimum: 1
        isAvailable:
          type: boolean
        amenities:
          type: array
          items:
            type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 5

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "NOT_FOUND"
        message:
          type: string
          example: "The requested resource was not found"
        details:
          type: object
          additionalProperties: true

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: "BAD_REQUEST"
            message: "Invalid query parameter: stars must be between 1 and 5"

    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: "UNAUTHORIZED"
            message: "Bearer token is missing or invalid"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: "NOT_FOUND"
            message: "Hotel with id 'h-999' was not found"

    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: "VALIDATION_ERROR"
            message: "Request body is invalid"
            details:
              name: "name is required"
              stars: "stars must be between 1 and 5"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: "INTERNAL_ERROR"
            message: "An unexpected error occurred"
